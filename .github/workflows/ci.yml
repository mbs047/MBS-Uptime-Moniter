name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/status

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: sqlite, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/status/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check PHP formatting
        run: ./vendor/bin/pint --test

      - name: Run test suite
        run: php artisan test

  probe-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            laravel: "^11.0"
            testbench: "^9.0"
          - php: "8.3"
            laravel: "^12.0"
            testbench: "^10.0"
          - php: "8.4"
            laravel: "^13.0"
            testbench: "^11.0"
    defaults:
      run:
        working-directory: packages/laravel-status-probe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sqlite, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-probe-composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('packages/laravel-status-probe/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-probe-composer-${{ matrix.php }}-${{ matrix.laravel }}-
            ${{ runner.os }}-probe-composer-

      - name: Resolve package test dependencies
        run: composer update --no-interaction --no-progress --prefer-dist --with laravel/framework:${{ matrix.laravel }} --with orchestra/testbench:${{ matrix.testbench }}

      - name: Run package test suite
        run: composer test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/status

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/status/package-lock.json

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build
