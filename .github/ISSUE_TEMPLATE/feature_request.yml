name: Feature request
description: Propose an improvement, enhancement, or new capability
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. The more concrete the proposal, the easier it is to evaluate and implement.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Operators need a way to pause checks during a planned maintenance window without deleting them.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UX, or API shape you want.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Call out affected areas such as admin UX, public status page, jobs, notifications, or APIs.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative approaches you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, references, or implementation notes that would help.
