name: Documentation improvement
description: Suggest improvements to setup guides, examples, or project docs
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Documentation issues are valuable. Please point to the exact page or section that needs attention.

  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Which file, section, or page needs to be updated?
      placeholder: README.md quick start section
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is missing or incorrect?
      description: Describe the gap, confusion, or inaccurate instruction.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Share the change you would like to see.
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Who is blocked by this doc gap?
      options:
        - First-time installers
        - Operators and admins
        - Developers contributing to the repo
        - Teams integrating remote Laravel apps
        - Package users
        - API consumers

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I checked the README, wiki, and docs folder before opening this request.
          required: true
